<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Flex — Dashboard</title>
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="app-shell">

    <header class="app-header">
      <span class="logo">💪 Flex</span>
      <span class="header-title">Dashboard</span>
    </header>

    <main class="app-main">
      <div class="page-container">
        <h1 class="page-title">Dashboard</h1>

        <!-- Stats -->
        <div class="stats-grid" id="stats-grid">
          <div class="stat-card skeleton" style="height:80px"></div>
          <div class="stat-card skeleton" style="height:80px"></div>
          <div class="stat-card skeleton" style="height:80px"></div>
          <div class="stat-card skeleton" style="height:80px"></div>
        </div>

        <!-- Volume chart -->
        <div class="section" style="margin-top:var(--space-6)">
          <div class="section-title">Volumen semanal (kg)</div>
          <div class="card">
            <canvas id="volume-chart" height="180"></canvas>
          </div>
        </div>

        <!-- Muscle groups -->
        <div class="section">
          <div class="section-title">Grupos musculares (30 días)</div>
          <div class="card">
            <canvas id="muscle-chart" height="200"></canvas>
          </div>
        </div>

        <!-- Recent sessions -->
        <div class="section">
          <div class="section-title">Últimas sesiones</div>
          <div id="recent-sessions"></div>
        </div>
      </div>
    </main>

    <nav class="bottom-nav">
      <div class="sidebar-logo">💪 Flex</div>
      <a href="chat.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <span>Chat</span>
      </a>
      <a href="dashboard.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
        <span>Dashboard</span>
      </a>
      <a href="routines.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
        </svg>
        <span>Rutinas</span>
      </a>
      <a href="history.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>
        <span>Historial</span>
      </a>
      <a href="profile.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <span>Perfil</span>
      </a>
    </nav>
  </div>

  <script src="js/api.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
