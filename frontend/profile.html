<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Flex — Perfil</title>
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body>
  <div class="app-shell">

    <header class="app-header">
      <span class="logo">💪 Flex</span>
      <span class="header-title">Perfil</span>
    </header>

    <main class="app-main">
      <div class="page-container">
        <h1 class="page-title">Mi Perfil</h1>

        <form id="profile-form">
          <div class="section">
            <div class="section-title">Datos personales</div>
            <div class="card">
              <div class="form-group">
                <label class="form-label">Nombre</label>
                <input type="text" class="form-input" id="name" placeholder="Tu nombre" />
              </div>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3)">
                <div class="form-group">
                  <label class="form-label">Edad</label>
                  <input type="number" class="form-input" id="age" min="10" max="100" placeholder="25" />
                </div>
                <div class="form-group">
                  <label class="form-label">Nivel</label>
                  <select class="form-select" id="fitness_level">
                    <option value="beginner">Principiante</option>
                    <option value="intermediate">Intermedio</option>
                    <option value="advanced">Avanzado</option>
                  </select>
                </div>
              </div>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3)">
                <div class="form-group">
                  <label class="form-label">Peso (kg)</label>
                  <input type="number" class="form-input" id="weight_kg" step="0.1" placeholder="75" />
                </div>
                <div class="form-group">
                  <label class="form-label">Altura (cm)</label>
                  <input type="number" class="form-input" id="height_cm" placeholder="175" />
                </div>
              </div>
            </div>
          </div>

          <div class="section">
            <div class="section-title">Objetivos y preferencias</div>
            <div class="card">
              <div class="form-group">
                <label class="form-label">Objetivo principal</label>
                <input type="text" class="form-input" id="primary_goal" placeholder="Ej: Ganar masa muscular" />
              </div>
              <div class="form-group">
                <label class="form-label">Días preferidos de entrenamiento</label>
                <input type="text" class="form-input" id="preferred_workout_days" placeholder="Ej: Lunes, Miércoles, Viernes" />
              </div>
              <div class="form-group">
                <label class="form-label">Duración de sesión (min)</label>
                <input type="number" class="form-input" id="session_duration_min" placeholder="60" />
              </div>
            </div>
          </div>

          <div class="section">
            <div class="section-title">Salud</div>
            <div class="card">
              <div class="form-group" style="margin-bottom:0">
                <label class="form-label">Lesiones o limitaciones</label>
                <textarea class="form-textarea" id="injuries_limitations" rows="3"
                  placeholder="Ej: Dolor en rodilla izquierda, evitar sentadilla profunda"></textarea>
              </div>
            </div>
          </div>

          <button type="submit" class="btn btn-primary" style="width:100%" id="save-btn">
            Guardar cambios
          </button>
        </form>
      </div>
    </main>

    <nav class="bottom-nav">
      <div class="sidebar-logo">💪 Flex</div>
      <a href="chat.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <span>Chat</span>
      </a>
      <a href="dashboard.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
        <span>Dashboard</span>
      </a>
      <a href="routines.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
        </svg>
        <span>Rutinas</span>
      </a>
      <a href="history.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>
        <span>Historial</span>
      </a>
      <a href="profile.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <span>Perfil</span>
      </a>
    </nav>
  </div>

  <script src="js/api.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
